<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Calculat😊r</title>
</head>

<body>


    <div class="calculator">
        <h2>Calculat😊r</h2>
        <input type="text" name="display" placeholder="0" readonly>
        <div class="digits">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>0</button>
        </div>
        <div class="opers">
            <button>+</button>
            <button>-</button>
            <button>*</button>
            <button>/</button>
            <button></button>
        </div>

        <button class="clear">C</button>
        <button class="result">=</button>
        <button class="backspace"> < </button>
    </div>
    <div>
        <button class="memory-save">MS</button>
        <button class="memory-return">MR</button>
        <button class="memory-clear">MC</button>
    </div>



    <script src='js/index.js'></script>
</body>

</html>
